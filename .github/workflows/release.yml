name: Release

on:
  push:
    branches: [main]

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: oven-sh/setup-bun@v2

      - uses: actions-rust-lang/setup-rust-toolchain@v1

      - name: Rust tests
        run: cargo test --workspace

      - name: Install TS deps
        run: bun install

      - name: Build TS packages
        run: bun run build

      - name: Typecheck TS packages
        run: bun run typecheck

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - uses: changesets/action@v1
        id: changesets
        with:
          version: bun x changeset version
          publish: bun x changeset publish
          commit: "chore: version packages"
          title: "chore: version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Sync Rust version and publish crates
        if: steps.changesets.outputs.published == 'true'
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          NEW_VERSION=$(jq -r '.version' packages/fnrpc-client/package.json)
          CURRENT_RUST_VERSION=$(sed -n 's/^version = "\(.*\)"/\1/p' Cargo.toml)

          if [ "$NEW_VERSION" != "$CURRENT_RUST_VERSION" ]; then
            sed -i "s/^version = \"$CURRENT_RUST_VERSION\"/version = \"$NEW_VERSION\"/" Cargo.toml
            git add Cargo.toml
            git commit -m "chore: bump Rust crates to v$NEW_VERSION"

            cargo publish -p fnrpc-macros
            cargo publish -p fnrpc
            cargo publish -p fnrpc-axum

            git push
          fi
