name: CI

on:
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - uses: actions-rust-lang/setup-rust-toolchain@v1

      - name: Install system deps
        run: sudo apt-get update && sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev

      - name: Rust tests
        run: cargo test --workspace --exclude tauri-solid-tanstack --exclude benches

      - name: Install TS deps
        run: bun install

      - name: Build TS packages
        run: bun run build

      - name: Typecheck TS packages
        run: bun run typecheck
