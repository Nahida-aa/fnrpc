[workspace]
members = [
    "crates/*",
    "examples/tauri-solid-tanstack/src-tauri"
]
default-members = ["crates/*"]
resolver = "3"

[workspace.package]
version = "0.1.0"
edition = "2024"

[workspace.dependencies]
async-trait = "0.1"
serde = { version = "1", features = ["derive"] }
specta = { version = "=2.0.0-rc.25", features = ["derive", "serde_json"] }
specta-typescript = { version = "0.0.12", features = ["serde"] }

[profile.release]
lto = "fat"
codegen-units = 1
